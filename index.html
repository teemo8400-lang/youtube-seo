<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>YouTube SEO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>YouTube SEO Checker</h1>

  <input id="keyword" placeholder="키워드 입력">
  <input id="video" placeholder="유튜브 영상 URL 또는 ID">
  <select id="region">
    <option value="KR">KR</option>
    <option value="US">US</option>
  </select>

  <button onclick="runAll()">검색</button>

  <p id="apiBox">대기</p>
  <h2 id="rankBox"></h2>
  <h2 id="scoreBox"></h2>

  <div id="results"></div>
  <div id="checks"></div>
  <div id="ideas"></div>

  <script src="script.js"></script>
</body>
</html>
